<div>
  <div ng-if="model !== undefined" class="item-root element-root" style="display:flex;align-items:center;flex-wrap:wrap;"  ng-click="toggleExpanded(index)">


    <div class="leader" style="position:relative;left:-12px;top: -5px;width: 10px; height: 0; border-top: 1px solid #9E9E9E; border-top: 1px solid red;">
      <button type="button"  style="position:relative;top:-12px;">
        <i class="fa " ng-class="{'fa-caret-down': isExpanded(index),'fa-caret-right':!isExpanded(index)}"></i>
      </button>
    </div>

    <!-- field title -->
    <label class="field-title"  for="{{getLocator(index)}}"
        aria-label="{{getDescription()}}">
      <div class="title element" >
        {{getPropertyLabel()}}<span ng-if="isRequired()" style="color:red">*</span>
      </div>
    </label>

    <field-toolbar ng-if="isExpanded(index)"
         values="valueArray" index="index" paging="!isSpreadsheetView()"
        min="pageMin" max="pageMax" range="pageRange"
        field="element" model="valueArray" index="index" view-state="viewState"
        remove="removeElement" add="addElement" copy="copyElement" is-active="isActive" set-active="setActive"
        spreadsheet="switchToSpreadsheet" toggle-expanded="toggleExpanded" close="unExpand"
        expand-all="expandAll" is-field="false" select="selectPage" get-locator="getLocator">
    </field-toolbar>


    <!-- inactive -->
    <div ng-if="!isExpanded(index)" id="{{getLocator(index)}}" style="background:transparent;padding:10px" class="form-group has-success has-feedback">

      <input class="form-control select" style="background:white;"
          id="{{getLocator(index)}}"
          type="text"
          aria-label="{{getDescription()}}"
          ng-value="getValue()"
          ng-disabled="true"/>

      <button type="button"
          class="form-control-feedback"
          style="pointer-events: auto;font-size:20px;color:#aaa;margin-right: 15px; margin-top: 10px;"
          tooltip-append-to-body="true"
          ng-if="getDescription() &amp;&amp; getDescription().length > 0" ng-click="$event.stopPropagation()"
          uib-tooltip="{{getDescription() | translate}}"
          tooltip-enable="getDescription() &amp;&amp; getDescription().length > 0">
        <i class="fa fa-question-circle"></i>
      </button>

      <!-- error messages  -->
      <div class="errors" ng-if="errorMessages">
        <div class="alert alert-danger" ng-repeat="message in errorMessages">{{message}}</div>
      </div>
    </div>

  </div>

  <!-- a spreadsheet list of elements -->
  <div ng-if="isExpanded(index) && isSpreadsheetView() " class="element expand" id="{{getLocator(index)}}"
      style="position:relative;">

    <div class="row" ng-if="isExpanded(index)">
      <div class="col-xs-12">
        <div class="spreadsheetViewDetector"></div>
        <div class="spreadsheetViewContainer"></div>
        <div id="spreadsheetViewLogs"></div>
        <div id="hooksList"></div>
      </div>
    </div>

  </div>

  <!-- a paged list of elements -->
  <div ng-if="isExpanded(index) && isTabView()" class="element expanded" >


    <ul class="tv flex-outer"  ng-if="isExpanded(index) && index === i" ng-repeat="(i, valueElement) in valueArray" id="{{getLocator(i)}}">

      <li class="tv"
          ng-class="{'last':$last, 'first':$first, 'element' : $root.isElement($root.schemaOf($root.propertiesOf(element)[fieldKey])), 'hidden': isHidden($root.propertiesOf(element)[key])}"
          ng-repeat="key in $root.schemaOf(element)['_ui']['order']" ng-if="isDisplayable(key)">

        <div ng-if="isExpanded(index) && index === i" style="width:100%">

          <cedar-runtime-nested-element
              field="$root.propertiesOf(element)[key]"
              model="valueArray[i][key]"
              labels="$root.schemaOf(element)['_ui']['propertyLabels']"
              relabel="relabel"
              remove-child="removeChild"
              rename-child-key="renameChildKey"
              is-edit-data="isEditData"
              parent-model="valueArray"
              parent-instance="i"
              parent-key="fieldKey"
              field-key="key"
              path="path+'-'+i"
              uid="uid+'-'+key"
              previous="$root.propertiesOf(element)[$root.schemaOf(element)['_ui']['order'][$index-1]]">
          </cedar-runtime-nested-element>
        </div>

      </li>
    </ul>
  </div>

</div>
