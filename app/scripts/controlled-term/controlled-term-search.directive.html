
<!-- properties | fields | values  content-->
<div ng-if="tsc.isFieldPropertiesMode()" class="element-toggle-add-values">

  <!--- creating properties -->
  <div ng-if="tsc.isCreating()" style="margin: 20px auto;">

    <form name="propertyForm">
      <div class="btn-start-over-group clearfix" style="visibility: hidden;">
        <button type="button" class="btn btn-start-over" >
          {{'CONTROLLEDTERMS.StartOver' | translate}}
        </button>
      </div>
      <div class="form-group form-group-actions clearfix">
        <div class="field-search">
          <div class="input-group field-search-input-group" style="width:100%">
            <input type="url" class="form-control field-search-form-control" name="propertyURI"
                placeholder="property URI" aria-label="property URI"
                ng-model="tsc.propertyUri" with-floating-label=""
                ng-submit="tsc.addPropertyUri()"/>
          </div>
        </div>

        <div class="search-messages" >
          <div class="search-msg" ng-show="!tsc.propertyUri">Please enter a URI</div>
        </div>

        <div class="search-messages" >
          <div class="search-msg" ng-show="tsc.propertyUri">Click OK to create the property</div>
        </div>

        <div class="clear btn-create-term" ng-show="tsc.propertyUri">
          <button  type="button"
              class="std-button btn"
              ng-click="tsc.addPropertyUri()">Ok
          </button>
        </div>
      </div>
    </form>
  </div>

  <!-- searching properties -->
  <div ng-if="tsc.isSearching()" style="margin: 0 auto;">
    <cedar-bioportal-search field-name="tsc.fieldName"  search-mode="tsc.searchMode" action="tsc.action" selected-class="tsc.selectedClass"
      current-ontology="tsc.currentOntology" reset-callback="tsc.resetCallback" add-property-callback="tsc.addPropertyCallback"
        add-class-callback="tsc.addClassCallback" add-value-callback="tsc.addValueCallback" add-value-set-callback="tsc.addValueSetCallback"
        is-loading-class-details="tsc.isLoadingClassDetails" is-creating-mappings="tsc.isCreatingMappings" is-creating-vs="tsc.isCreatingVs"
        tree-visible="tsc.treeVisible"></cedar-bioportal-search>
  </div>

</div>

<div ng-if="tsc.isFieldTypesMode()" class="element-toggle-add-values">

  <!-- creating fields -->
  <div ng-if="tsc.isCreating()" style="margin: 20px auto;max-width: 800px">

    <div class="clear form-group add-ontology-class"
        ng-controller="provisionalClassController as pcc">
      <ng-include src="'scripts/controlled-term/create-ontology-class.html'"></ng-include>
      <div class="clear btn-create-term" ng-if="pcc.isValid()">
        <button type="button"
            class="std-button btn"
            ng-click="pcc.saveAsFieldItem(pcc.provisionalClass)"
            >Create Term
        </button>
        <!--<div class="input-indicator-icons">-->
        <i class="cedar-svg-help-circle help-icon"
            uib-tooltip="The term will be created in the CEDARPC (CEDAR Provisional Classes) BioPortal ontology and added to your template"></i>
        <!--</div>-->
      </div>
    </div>
  </div>

  <!-- searching fields -->
  <div ng-if="tsc.isSearching()" style="margin: 20px auto;max-width: 800px">
    <cedar-bioportal-search field-name="tsc.fieldName"  search-mode="tsc.searchMode" action="tsc.action" selected-class="tsc.selectedClass"
        current-ontology="tsc.currentOntology" reset-callback="tsc.resetCallback" add-property-callback="tsc.addPropertyCallback"
        add-class-callback="tsc.addClassCallback" add-value-callback="tsc.addValueCallback" add-value-set-callback="tsc.addValueSetCallback"
        is-loading-class-details="tsc.isLoadingClassDetails" is-creating-mappings="tsc.isCreatingMappings" is-creating-vs="tsc.isCreatingVs"
        tree-visible="tsc.treeVisible"></cedar-bioportal-search>
  </div>

</div>

<div ng-if="tsc.isFieldValuesMode()" class="element-toggle-add-values">


  <div ng-if="!tsc.isCreatingMappings && !tsc.isCreatingVs">

    <!-- create values -->
    <div ng-if="tsc.isCreating()" style="margin: 20px auto;max-width: 800px">

      <!-- term or value set buttons -->
        <div style="text-align:center;margin:20px 0" >
          Create a single
          <button  class="std-btn btn btn-add-create-term" ng-class="{selected:tsc.creatingObject=='value'}"  ng-click="tsc.switchToCreateValue()">Value</button>
          term or a
          <button  class="std-btn btn btn-add-create-term" ng-class="{selected:tsc.creatingObject=='value-set'}"  ng-click="tsc.switchToCreateValueSet()">Value Set</button>
          of terms.
        </div>


      <!-- Tabs content -->
      <div>
        <!-- Create Term (Tab Content) -->
        <div ng-if="tsc.creatingObject == 'value'" class="clear form-group add-ontology-class"
            ng-controller="provisionalClassController as pcc">
          <ng-include src="'scripts/controlled-term/create-ontology-class.html'"></ng-include>
          <div class="search-messages"><div class="search-msg">The term will be created in the (CEDAR Provisional Classes) BioPortal ontology and added to your template.</div></div>

          <div class="clear btn-create-term" ng-ifd="pcc.isValid()">
            <button type="button"
                class="std-button btn"
                ng-click="pcc.saveAsOntologyClassValueConstraint(pcc.provisionalClass)">OK
            </button>
            <!--<i class="cedar-svg-help-circle help-icon"-->
                <!--uib-tooltip="The term will be created in the (CEDAR Provisional Classes) BioPortal ontology and added to your template"></i>-->
          </div>
        </div>
        <!-- Create Value Set (Tab Content) -->
        <div ng-if="tsc.creatingObject == 'value-set'" class="clear form-group add-ontology-class" ng-controller="provisionalClassController as pcc">
          <ng-include src="'scripts/controlled-term/create-value-set.html'"></ng-include>
          <div class="search-messages"><div class="search-msg">The value set will be created in the (CEDAR Value Sets) BioPortal ontology and added to your template.</div></div>
          <div class="clear btn-create-term" ng-if="pcc.isValid()">
            <button type="button"
                class="std-button btn"
                ng-click="pcc.saveAsValueSetConstraint(pcc.provisionalClass, pcc.provisionalValueSetValues)"
                ng-disabled="!pcc.isValid() || pcc.provisionalValueSetValues.length == 0 || pcc.showCreateVsLoader">
              OK
            </button>
            <!--<i class="cedar-svg-help-circle help-icon"-->
                <!--uib-tooltip="The value set will be created in the (CEDAR Value Sets) BioPortal ontology and added to your template"></i>-->
          </div>
          <!--Create value set loader-->
          <div ng-if="pcc.showCreateVsLoader"  style="height:330px;">
            <div class="loader2"></div>
          </div>
          <br/>
        </div>
      </div>
    </div>

    <!-- search content -->
    <div ng-if="tsc.isSearching()" style="margin: 20px auto;">
      <cedar-bioportal-search field-name="tsc.fieldName"  search-mode="tsc.searchMode" action="tsc.action" selected-class="tsc.selectedClass"
          current-ontology="tsc.currentOntology" reset-callback="tsc.resetCallback" add-property-callback="tsc.addPropertyCallback"
          add-class-callback="tsc.addClassCallback" add-value-callback="tsc.addValueCallback" add-value-set-callback="tsc.addValueSetCallback"
          is-loading-class-details="tsc.isLoadingClassDetails" is-creating-mappings="tsc.isCreatingMappings" is-creating-vs="tsc.isCreatingVs"
          tree-visible="tsc.treeVisible"></cedar-bioportal-search>
    </div>

  </div>
</div>
