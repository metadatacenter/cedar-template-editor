  <div class="leader"
      style="position:relative;left:-12px;top: -5px;width: 10px; height: 0; border-top: 1px solid #9E9E9E;"></div>

  <div ng-if="isSectionBreak()" class="row">
    <div class="section-break-inline">{{getTitle()}}</div>
  </div>

  <!-- field title -->
  <label ng-if="!isSectionBreak()" ng-click="toggleActive(0)" for="{{getLocator(0)}}" class="field-title"
      aria-label="{{getDescription()}}">
    <div class="title field">
      {{getPropertyLabel()}}<span ng-if="isRequired()" style="color:red">*</span>
    </div>
  </label>

  <!-- inactive -->
  <div ng-if="!isSectionBreak() && !isActive(index)" id="{{getLocator(0)}}"
     style="background:transparent;padding:10px"  ng-click="setActive(index,true)" class="form-group has-success has-feedback form-field">

    <input class="form-control select" style="background:white;"
        id="{{getLocator(index)}}"
        type="text"
        aria-label="{{getDescription()}}"
        ng-value="getValue()"
        ng-disabled="true"/>

    <button type="button"
        class="form-control-feedback"
        style="pointer-events: auto;font-size:20px;color:#aaa;margin-right: 15px; margin-top: 10px;"
        tooltip-append-to-body="true"
        ng-if="getDescription() &amp;&amp; getDescription().length > 0" ng-click="$event.stopPropagation()"
        uib-tooltip="{{getDescription() | translate}}"
        tooltip-enable="getDescription() &amp;&amp; getDescription().length > 0">
      <i class="fa fa-question-circle"></i>
    </button>

    <!-- error messages  -->
    <div class="errors" ng-if="errorMessages">
      <div class="alert alert-danger" ng-repeat="message in errorMessages">{{message}}</div>
    </div>
  </div>

  <!-- active tabbed -->
  <div ng-if="!isSectionBreak() && isActive(index) && isTabView() && valueArray.length > 0"
      class="form-field"
      style="padding:10px;border: 1px solid #ccc;background: #f8f8f8;" id="{{getLocator(0)}}" >

    <field-toolbar values="valueArray" min="pageMin"
        max="pageMax" select="selectPage" paging="isMultipleCardinality()"
        range="pageRange" model="model" field="field" index="index"
        remove="removeInput" add="addMoreInput" copy="copyField" set-active="setActive"
        expand-all="expandAll"
        get-locator="getLocator" view-state="viewState">
    </field-toolbar>

    <form name="field-edit-form-{{index}}" ng-submit="onSubmit(index)">
      <div ng-include="getFieldUrl()"></div>
      <button type="submit" class="btn btn-save confirm active" translate>GENERIC.Ok</button>
      <label class="submit-info" translate>GENERIC.OrCtrlEnter</label>
    </form>

    <!-- error messages  -->
    <div class="errors" ng-if="errorMessages">
      <div class="alert alert-danger" ng-repeat="message in errorMessages">{{message}}</div>
    </div>
  </div>

  <!-- active spreadsheet -->
  <div ng-if="!isSectionBreak() && isActive(index) && isSpreadsheetView()" style="background:#ddd;padding:10px" id="{{getLocator(0)}}" >

    <field-toolbar values="valueArray" min="pageMin"
        max="pageMax" select="selectPage" paging="false"
        range="pageRange" model="model" field="field" index="index"
        remove="removeInput" add="addMoreInput" copy="copyField" set-active="setActive"
        expand-all="expandAll"
        get-locator="getLocator" view-state="viewState">
    </field-toolbar>

    <div class="spreadsheetViewDetector"></div>
    <div class="spreadsheetViewContainer"></div>
    <div id="spreadsheetViewLogs"></div>
    <div id="hooksList"></div>
    <div id="htDatepickerHolder"></div>

  </div>

</div>
