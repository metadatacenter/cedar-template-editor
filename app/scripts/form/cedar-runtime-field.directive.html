<div class="item-root field-root">

  <!-- field content  -->
  <div class="elementTotalContent visible" style="position:relative">
    <div class="fields text-fields">

      <div ng-if="!isActive(index)">
         <!--field  not active-->

        <!-- section break --->
        <div ng-if="isSectionBreak()" class="section-break-inline">{{getTitle()}}</div>

        <div ng-if="!isSectionBreak()">

          <!-- title --->
          <div ng-click="toggleActive(0)" class="field" style="cursor:pointer;">
            {{getTitle()}}<span ng-if="isRequired()" style="color:red">*</span></div>

          <!-- content -->
          <div style="cursor:pointer" ng-repeat="(index, valueElement) in valueArray">
            <div id="{{getLocator(index)}}">
              <div class="isRowInactive" ng-click="setActive(index, true)">
                <div style="color:#888" ng-include="getFieldUrl()"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- all error messages for this field  -->
        <div class="errors" ng-if="errorMessages">
          <div class="alert alert-danger" ng-repeat="message in errorMessages">{{message}}</div>
        </div>

      </div>

      <div ng-if="isActive(index)">


        <!-- show the spreadsheet -->
        <div ng-if="isSpreadsheetView()">

          <!-- section break --->
          <div ng-if="isSectionBreak()" class="section-break-inline">{{getTitle()}}</div>

          <div ng-if="!isSectionBreak()" id="{{getLocator(index)}}">

            <!-- title --->
            <field-title toggle-active="toggleActive" get-title="getTitle" is-required="isRequired" values="valueArray"
                min="pageMin"
                max="pageMax" select="selectPage" paging="isMultipleCardinality() && isTabView()"
                range="pageRange" model="model" field="field" index="index"
                remove="removeInput" add="addMoreInput" copy="copyField" set-active="setActive"
                expand-all="expandAll"
                get-locator="getLocator" view-state="viewState">
            </field-title>

            <!-- content -->
            <div  style="padding:20px 0;">
              <div class="isActive answer" style="padding:20px;border: 1px solid #ccc;background: #f8f8f8;">

                <div ng-if="isPreviousStatic()" style="overflow-x:hidden">
                  <div ng-if="isImage(previous)" class="image">
                    <figure>
                      <img ng-src="{{$root.schemaOf(previous)._ui._content}}" no-image alt="{{getTitle(previous)}}"
                          type="image/png" width="100%"/>
                      <figcaption><label>{{getTitle(previous)}}</label></figcaption>
                    </figure>
                  </div>
                  <div ng-if="isRichText(previous) && getUnescapedContent(previous)" class="richtext"
                      ng-bind-html="getUnescapedContent(previous)"></div>
                  <div ng-if="isYouTube(previous)" class="youtube">
                    <figure>
                      <div fit-vids ng-bind-html="getYouTubeEmbedFrame(previous)"></div>
                    </figure>
                  </div>
                </div>

                <form name="field-edit-form-{{index}}" ng-submit="onSubmit(index)">
                  <div class="spreadsheetViewDetector"></div>
                  <div class="spreadsheetViewContainer"></div>
                  <div id="spreadsheetViewLogs"></div>
                  <div id="hooksList"></div>
                  <div id="htDatepickerHolder"></div>
                  <button type="submit" class="btn btn-save confirm active" style="margin:10px 0 0 0" translate>GENERIC.Ok</button>
                  <label class="submit-info" translate>GENERIC.OrCtrlEnter</label>
                </form>

              </div>
            </div>

          </div>
        </div>

        <!-- show a tabbed list of fields, one index at a time  -->
        <div ng-if="isTabView()">

          <!-- section break --->
          <div ng-if="isSectionBreak()" class="section-break-inline">{{getTitle()}}</div>

          <div ng-if="!isSectionBreak()" id="{{getLocator(index)}}">

            <field-title get-title="getTitle" is-required="isRequired" toggle-active="toggleActive" values="valueArray"
                min="pageMin" max="pageMax" select="selectPage" paging="isMultipleCardinality()"
                range="pageRange" model="model" field="field" index="index" remove="removeInput" add="addMoreInput"
                copy="copyField" set-active="setActive" expand-all="expandAll" get-locator="getLocator"
                view-state="viewState">
            </field-title>

            <!-- content -->
            <div style="padding:20px 0;">
              <div class="isActive answer" style="padding:20px;border:1px solid #ccc;background: #f8f8f8;">

                <div ng-if="isPreviousStatic()" style="overflow-x:hidden">
                  <div ng-if="isImage(previous)" class="image">
                    <figure>
                      <img ng-src="{{$root.schemaOf(previous)._ui._content}}" no-image alt="{{getTitle(previous)}}"
                          type="image/png" width="100%"/>
                      <figcaption><label>{{getTitle(previous)}}</label></figcaption>
                    </figure>
                  </div>
                  <div ng-if="isRichText(previous) && getUnescapedContent(previous)" class="richtext"
                      ng-bind-html="getUnescapedContent(previous)"></div>
                  <div ng-if="isYouTube(previous)" class="youtube">
                    <figure>
                      <div fit-vids ng-bind-html="getYouTubeEmbedFrame(previous)"></div>
                    </figure>
                  </div>
                </div>

                <form name="field-edit-form-{{index}}" ng-submit="onSubmit(index)">
                  <div ng-include="getFieldUrl()"></div>
                  <button type="submit" class="btn btn-save confirm active" style="margin:10px 0 0 0" translate>
                    GENERIC.Ok
                  </button>
                  <label class="submit-info" translate>GENERIC.OrCtrlEnter</label>
                </form>

              </div>
            </div>
          </div>
        </div>

        <!-- show an expanded list of fields from the valueArray, all the indicies -->
        <div ng-if="isListView()">

          <!-- section break --->
          <div ng-if="isSectionBreak()" class="section-break-inline">{{getTitle()}}</div>

          <div ng-if="!isSectionBreak()">

            <!-- title --->
            <field-title toggle-active="toggleActive" get-title="getTitle" is-required="isRequired" values="valueArray"
                min="pageMin"
                max="pageMax" select="selectPage" paging="false"
                range="pageRange" model="model" field="field" index="index"
                remove="removeInput" add="addMoreInput" copy="copyField" set-active="setActive"
                expand-all="expandAll"
                get-locator="getLocator" view-state="viewState">
            </field-title>

            <div ng-repeat="(index, valueElement) in valueArray">
              <div id="{{getLocator(index)}}">

                <!-- inactive content -->
                <div ng-if="!isActive(index)" class="isRowInactive">
                  <div ng-click="setActive(index, true)" style="cursor:pointer">
                    <div style="color:#888" ng-include="getFieldUrl()"></div>
                  </div>
                </div>

                <!-- active content -->
                <div ng-if="isActive(index)" style="padding:20px 0;">
                  <div class="isActive answer" style="padding:20px;border: 1px solid #ccc;background: #f8f8f8;">

                    <div ng-if="isPreviousStatic()" style="overflow-x:hidden">
                      <div ng-if="isImage(previous)" class="image">
                        <figure>
                          <img ng-src="{{$root.schemaOf(previous)._ui._content}}" no-image alt="{{getTitle(previous)}}"
                              type="image/png" width="100%"/>
                          <figcaption><label>{{getTitle(previous)}}</label></figcaption>
                        </figure>
                      </div>
                      <div ng-if="isRichText(previous) && getUnescapedContent(previous)" class="richtext"
                          ng-bind-html="getUnescapedContent(previous)"></div>
                      <div ng-if="isYouTube(previous)" class="youtube">
                        <figure>
                          <div fit-vids ng-bind-html="getYouTubeEmbedFrame(previous)"></div>
                        </figure>
                      </div>
                    </div>

                      <form name="field-edit-form-{{index}}" ng-submit="onSubmit(index)">
                        <div class="originalContent" ng-include="getFieldUrl()"></div>
                        <button type="submit" class="btn btn-save confirm active" style="margin:10px 0 0 0" translate>GENERIC.Ok</button>
                        <label class="submit-info" translate>GENERIC.OrCtrlEnter</label>
                      </form>

                  </div>
                </div>
              </div>
            </div>

          </div>


          <!-- all error messages for this field  -->
          <div class="errors" ng-if="errorMessages">
            <div class="alert alert-danger" ng-repeat="message in errorMessages">{{message}}</div>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
