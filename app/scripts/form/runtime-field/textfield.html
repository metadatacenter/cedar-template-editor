<div ng-init="initializeValue(); initializeValueType()">


  <div ng-click="setActive(index,true)" id="{{getLocator(index)}}">

    <!-- Regular field -->
    <div ng-if="isRegular()">
      <div ng-if="getValueLocation() === '@value'" class="form-group has-success has-feedback" style="margin:5px 0">
        <input type="text"
            name="{{getTitle()}}"

            minLength="{{getMinLength()}}"
            maxLength="{{getMaxLength()}}"
            validate-on="blur"
            string-validation

            class="form-control select"
            ng-class="{'isActive' : isActive(index), 'required': isRequired()}"
            placeholder="{{isActive(index) ? getPlaceholderText() : ''}}"
            aria-label="{{getDescription()}}"
            ng-required="isRequired()"
            ng-model="valueElement['@value']"
            ng-model-options="{allowInvalid:true}">
        </input>
        <div class="input-indicator-icons" ng-include="'scripts/form/partials/indicator-icons.partial.html'"></div>
      </div>

      <div ng-if="getValueLocation() === '@id'" class="form-group has-success has-feedback" style="margin:5px 0">
        <input type="text"
            name="{{getTitle()}}"

            minLength="{{getMinLength()}}"
            maxLength="{{getMaxLength()}}"
            ng-pattern="urlRegex"
            validate-on="blur"
            string-validation

            class="form-control select"
            ng-class="{'isActive' : isActive(index), 'required': isRequired()}"
            placeholder="{{isActive(index) ? 'enter URI' : ''}}"
            aria-label="{{getHelp()}}"
            ng-required="isRequired()"
            ng-model="valueElement['@id']"

            ng-model-options="{allowInvalid:true}">
        </input>
        <div class="input-indicator-icons" ng-include="'scripts/form/partials/indicator-icons.partial.html'"></div>
      </div>
    </div>


    <!-- Field with values have been constrained using controlled terms -->
    <constrained-value ng-if="isConstrained()" class="form-group  has-feedback" model="model" index="index"
        field="field"></constrained-value>

    <!-- Field with value recommendation functionality -->
    <recommended-value ng-if="isRecommended()" class="form-group  has-feedback" model="model" index="index"
        field="field"></recommended-value>

  </div>
</div>
