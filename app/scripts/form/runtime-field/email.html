<div ng-init="initializeValue(field)">

  <div  class="form-group  has-feedback " ng-click="setActive(index)">
    <input type="email"
        tabindex="0"
        name="{{getTitle()}}+index"
        class="form-control select"
        ng-class="{'isActive' : isActive(index), 'required': isRequired()}"
        placeholder="{{isActive(index) ? 'enter email' : ''}}"
        aria-label="{{getHelp()}}"
        ng-model="valueElement['@value']"
        ng-model-options="{allowInvalid:true}"
        validate-on="blur"
        ng-pattern="/^([\w-\.]+)@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.)|(([\w-]+\.)+))([a-zA-Z]{2,4}|[0-9]{1,3})(\]?)$/"/>

    <div class="input-indicator-icons" ng-include="'scripts/form/partials/indicator-icons.partial.html'"></div>
  </div>

</div>
