<div ng-init="initializeValue(field)">

  <div ng-if="!isActive(index)" ng-click="setActive(index,true)" class="form-group  has-feedback value">
    <div aria-label="{{getDescription()}}" class="isInactive truncate">{{valueArray[index]['@value']}}</div>
  </div>

  <div ng-if="isActive(index)" class="form-group has-success has-feedback">
    <textarea
        rows="5"
        class="form-control isActive select"
        ng-class="{'required': isRequired()}"
        placeholder="{{isActive(index) ? 'enter value' : ''}}"
        aria-label="{{getDescription()}}"
        ng-required="isRequired()"
        ng-model="valueArray[index]['@value']"></textarea>
    <div class="input-indicator-icons" ng-include="'scripts/form/partials/indicator-icons.partial.html'"></div>
  </div>

</div>
