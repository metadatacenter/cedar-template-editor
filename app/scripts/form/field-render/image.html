<div class="fields fields-email">

  <!-- header row -->
  <div ng-init="fieldTitle='&nbsp;Image';fieldIconClass='cedar-svg-image'" ng-include="'scripts/form/partials/field-header.partial.html'"></div>

  <div  class="form-group floating-label-wrapper" >
    <input type="text"
        class="form-control"
        placeholder="{{getTitle()}}"
        aria-label="{{getDescription()}}"
        ng-disabled="true"
        with-floating-label=""/>
    <div class="input-indicator-icons ng-valid ng-scope" ng-include="'scripts/form/partials/indicator-icons.partial.html'"></div>
  </div>

</div>
