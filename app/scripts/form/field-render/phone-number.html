<div class="fields fields-phone-number">

  <!-- header row -->
  <div ng-init="fieldTitle='Phone Number';fieldIconClass='cedar-svg-phone'" ng-include="'scripts/form/partials/field-header.partial.html'"></div>

  <div ng-if="hasModel()" class="form-group floating-label-wrapper" ng-repeat="valueElement in model">
    <input type="text"
        class="form-control"
        placeholder="{{getTitle()}}"
        aria-label="{{getDescription()}}"
        ng-disabled="true"
        with-floating-label=""/>
    <div class="input-indicator-icons ng-valid ng-scope" ng-include="'scripts/form/partials/indicator-icons.partial.html'"></div>
  </div>

  <div ng-if="!hasModel()" class="form-group floating-label-wrapper">
      <input type="text"
          class="form-control"
          placeholder="{{getTitle()}}"
          aria-label="{{getDescription()}}"
          ng-disabled="true"
          with-floating-label="">
      </input>
      <div class="input-indicator-icons ng-valid ng-scope" ng-include="'scripts/form/partials/indicator-icons.partial.html'"></div>
  </div>

</div>
