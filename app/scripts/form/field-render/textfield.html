<div class="fields text-fields" ng-class="{preview: preview}">

  <!-- Header row -->
  <div ng-init="fieldTitle='Text';fieldIconClass='cedar-svg-text'" ng-include="'scripts/form/partials/field-header.partial.html'"></div>
  
  <!-- textfield (minimum cardinality = 0 or single textfield) -->
  <div ng-valid="false" ng-if="!hasModel()" class="form-group floating-label-wrapper has-feedback" >
    <input type="text"
        class="form-control "
        placeholder="{{getTitle()}}"
        aria-label="{{getDescription()}}"
        ng-disabled="true"
        with-floating-label=""/>
    <span class="input-indicator-icons" ng-include="'scripts/form/partials/indicator-icons.partial.html'"></span>
  </div>

  <!-- textfield (minimum cardinality > 0) -->
  <div ng-valid="false" ng-if="hasModel()" ng-init="setDefaultValueIfEmpty(model)"  class="form-group floating-label-wrapper has-feedback" ng-repeat="(index, valueElement) in model">
      <input type="text"
          class="form-control"
          placeholder="{{getTitle()}}"
          aria-label="{{getDescription()}}"
          ng-disabled="true"
          with-floating-label=""/>
      <span class="input-indicator-icons" ng-include="'scripts/form/partials/indicator-icons.partial.html'"></span>
  </div>
</div>
