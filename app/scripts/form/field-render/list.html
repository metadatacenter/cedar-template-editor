<div class="fields fields-list">

  <!-- header row -->
  <div ng-init="fieldTitle='Pick from a list';fieldIconClass='cedar-svg-list'" ng-include="'scripts/form/partials/field-header.partial.html'"></div>

  <div class="form-group floating-label-wrapper">
    <input type="text"
        class="form-control"
        placeholder="{{getTitle()}}"
        aria-label="{{getDescription()}}"
        ng-disabled="true"
        with-floating-label="">
    </input>
    <div class="input-indicator-icons ng-valid ng-scope" ng-include="'scripts/form/partials/indicator-icons.partial.html'"></div>

    <div  style="margin-top:2px">
      <select class="form-control"
          multiple="isMultipleChoice()"
          field="field"
          title="Please select"
          ng-disabled="true"
          select-picker="">
      </select>
    </div>
  </div>

</div>
